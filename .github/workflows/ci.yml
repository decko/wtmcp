name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true

      - name: Install system dependencies
        run: sudo apt-get install -y libkrb5-dev

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/bin/cbindgen
            ~/.cargo/registry
            third_party/arapuca/target
          key: cargo-${{ runner.os }}-${{ hashFiles('third_party/arapuca/Cargo.toml', 'third_party/arapuca/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install cbindgen
        run: command -v cbindgen || cargo install cbindgen

      - name: Build libarapuca
        run: |
          make arapuca
          echo "PKG_CONFIG_PATH=${{ github.workspace }}/build/arapuca/lib/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libkrb5-dev

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/bin/cbindgen
            ~/.cargo/registry
            third_party/arapuca/target
          key: cargo-${{ runner.os }}-${{ hashFiles('third_party/arapuca/Cargo.toml', 'third_party/arapuca/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install cbindgen
        run: command -v cbindgen || cargo install cbindgen

      - name: Build libarapuca
        run: |
          make arapuca
          echo "PKG_CONFIG_PATH=${{ github.workspace }}/build/arapuca/lib/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"

      - name: Build
        run: make build

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      - name: Nosandbox stub tests
        run: make test-nosandbox

      - name: Vulnerability check
        if: runner.os == 'Linux'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          make govulncheck

      - name: Generate SBOM
        if: runner.os == 'Linux'
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.8.0
          cyclonedx-gomod mod -json -output wtmcp.sbom.json

      - name: Upload SBOM
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: wtmcp.sbom.json

  python:
    name: Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Test Python plugins
        run: python -m pytest plugins/ -v
